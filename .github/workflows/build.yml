name: Build Jarvis APKs

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Gradle 8.10
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.10'

    - name: Generate Gradle wrapper
      run: gradle wrapper --gradle-version 8.10

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Build phone APK
      run: ./gradlew :app:assembleDebug
      env:
        CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}

    - name: Build watch APK
      run: ./gradlew :wear:assembleDebug
      env:
        CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}

    - name: Upload phone APK
      uses: actions/upload-artifact@v4
      with:
        name: Phone-Jarvis-Assistant
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Upload watch APK
      uses: actions/upload-artifact@v4
      with:
        name: Watch-Jarvis-Assistant
        path: wear/build/outputs/apk/debug/wear-debug.apk
