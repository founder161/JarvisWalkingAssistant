name: Build Jarvis APKs

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Gradle
      uses: gradle/gradle-build-action@v3
      with:
        gradle-version: 8.10
    
    - name: Build phone APK
      run: gradle :app:assembleDebug
      env:
        CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
    
    - name: Build watch APK
      run: gradle :wear:assembleDebug
      env:
        CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
    
    - name: Upload phone APK
      uses: actions/upload-artifact@v4
      with:
        name: Phone-Jarvis-Assistant
        path: app/build/outputs/apk/debug/app-debug.apk
    
    - name: Upload watch APK
      uses: actions/upload-artifact@v4
      with:
        name: Watch-Jarvis-Assistant
        path: wear/build/outputs/apk/debug/wear-debug.apk
