name: Build Jarvis APKs

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Make gradlew executable
      run: chmod +x gradlew
    
    - name: Build phone APK
      run: ./gradlew assembleDebug --project-dir=app
    
    - name: Build watch APK
      run: ./gradlew assembleDebug --project-dir=wear
    
    - name: Upload phone APK
      uses: actions/upload-artifact@v3
      with:
        name: Phone-Jarvis-Assistant
        path: app/build/outputs/apk/debug/app-debug.apk
    
    - name: Upload watch APK
      uses: actions/upload-artifact@v3
      with:
        name: Watch-Jarvis-Assistant
        path: wear/build/outputs/apk/debug/wear-debug.apk
